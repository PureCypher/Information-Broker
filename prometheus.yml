global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/rules/content_volume_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'information-broker-metrics'
    static_configs:
      - targets: ['rss-monitor:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    params:
      format: ['prometheus']
    # Liveness is derived from this job's `up` series. (A separate /health job
    # was removed: /health returns JSON, which Prometheus cannot parse as
    # metrics, so it produced a permanently-down target.)